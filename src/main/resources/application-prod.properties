spring.datasource.url=jdbc:mysql://localhost:3306/mindspacedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=mindspace_user
spring.datasource.password=your_secure_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
app.jwt.secret=MindSpace2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration-ms=86400000
